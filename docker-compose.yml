version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: movieshark_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  mysql:
    image: mysql:8
    container_name: movieshark_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootroot1234
      - MYSQL_DATABASE=movieshark
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  elasticsearch_data:
  mysql_data:
